  about:
    enable: true
    title: "About Khavin"
    image: "/images/khavin-about.jpg"
    content: |-
      I was born and raised in Sacramento, CA. My mother was a teacher, and my father was a community activist and railroad conductor. This blend of perspectives instilled in me a passion for justice and a love for exploring and being outdoors.

      I studied Early Childhood Education at Sacramento City College, and later worked at Mustard Seed School as an elementary school teacher to homeless children — where I also received my Montessori teacher training. I relocated to Seattle in 2013, where I completed my BA in Environmental Studies at The Evergreen State College and my Master's in Urban Environmental Education at Antioch University.

      My goal is simple: to promote environmental justice through community-based, DEI-rooted education.
