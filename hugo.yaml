  # Seminars & Offerings as "projects"
  projects:
    enable: true
    title: "Seminars & Offerings"
    items:
      - title: "#NatureSoWhite"
        content: "Narrow definitions of nature, intergenerational trauma, and a lack of representation have all contributed to the narrative that BIPOC don't engage in outdoor spaces. We dive deep into these issues and explore solutions through Place-Based Education, ECE, and self-reflection."
        badges:
          - "DEI"
          - "ECE"
          - "Place-Based Education"
        links:
          - icon: fa fa-envelope
            url: "#contact"

      - title: "Get Out: Community-Based Environmental Learning"
        content: "From our bodies to our homes to our communities — there is much to learn from the spaces we inhabit regularly. We reflect on our own journeys and learn how using students' everyday existence as the driving force can lead to teaching practices rooted in DEI and environmental justice."
        badges:
          - "DEI"
          - "Community"
          - "Environmental Justice"
        links:
          - icon: fa fa-envelope
            url: "#contact"

      - title: "Implicit Bias: Unpack That S**t"
        content: "We learn what implicit bias is, how it manifests in early childhood education, and how we can check our own stereotypes — so we can encourage our peers and children to do the same."
        badges:
          - "Implicit Bias"
          - "ECE"
          - "Self-Reflection"
        links:
          - icon: fa fa-envelope
            url: "#contact"

      - title: "Environmental-Based Interagency Partnerships"
        content: "Want to learn how to partner with other organizations? This training covers tactics and conversations to have before reaching out, as well as ways to sustain relationships with public entities and nonprofits alike."
        badges:
          - "Partnerships"
          - "Nonprofits"
          - "Strategy"
        links:
          - icon: fa fa-envelope
            url: "#contact"

      - title: "Broadening Our Environmental Perspective"
        content: "Whenever we have a conversation about the environment, it tends to be siloed. This talk lays a new foundation for what nature and the environment entail — and why expanding that definition is imperative for achieving environmental justice."
        badges:
          - "Environmental Justice"
          - "Inclusion"
          - "Perspective"
        links:
          - icon: fa fa-envelope
            url: "#contact"

      - title: "Consulting & Photography Workshops"
        content: "DEI and anti-racism consulting for outdoor, early childhood, and environmental-based curriculum. Also offering urban nature photography workshops — where attendees explore new perspectives and discover how nature and the built environment are one and the same."
        badges:
          - "Consulting"
          - "Photography"
          - "Urban Nature"
        links:
          - icon: fa fa-envelope
            url: "#contact"

